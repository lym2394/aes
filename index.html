<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>AES 加密 / 解密工具</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
<style>
    * { box-sizing: border-box; }
    body {
        font-family: "Microsoft YaHei", sans-serif;
        background: linear-gradient(135deg, #667eea, #764ba2);
        min-height: 100vh;
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
    }
    .container {
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        padding: 30px;
        width: 100%;
        max-width: 700px;
    }
    h1 {
        text-align: center;
        color: #4a4a8a;
        margin-bottom: 25px;
    }
    label {
        display: block;
        margin-top: 15px;
        font-weight: bold;
        color: #333;
    }
    textarea, input[type="text"], input[type="password"], select {
        width: 100%;
        padding: 10px;
        margin-top: 6px;
        border: 1px solid #ccc;
        border-radius: 6px;
        font-size: 14px;
        font-family: monospace;
    }
    textarea { resize: vertical; min-height: 90px; }
    .btn-group {
        display: flex;
        gap: 10px;
        margin-top: 20px;
    }
    button {
        flex: 1;
        padding: 12px;
        border: none;
        border-radius: 6px;
        color: white;
        font-size: 15px;
        cursor: pointer;
        transition: 0.2s;
    }
    .btn-encrypt { background: #28a745; }
    .btn-decrypt { background: #007bff; }
    .btn-clear   { background: #dc3545; }
    button:hover { opacity: 0.85; }
    .row { display: flex; gap: 10px; }
    .row > div { flex: 1; }
    .tip {
        font-size: 12px;
        color: #888;
        margin-top: 4px;
    }
</style>
</head>
<body>
<div class="container">
    <h1>🔐 AES 加密 / 解密工具</h1>

    <label>明文 / 密文输入:</label>
    <textarea id="inputText" placeholder="请输入需要加密或解密的内容..."></textarea>

    <div class="row">
        <div>
            <label>密钥 (Key):</label>
            <input type="password" id="secretKey" placeholder="请输入密钥">
            <div class="tip">建议 16 / 24 / 32 位字符</div>
        </div>
        <div>
            <label>加密模式:</label>
            <select id="mode">
                <option value="CBC">CBC</option>
                <option value="ECB">ECB</option>
            </select>
        </div>
    </div>

    <label>IV 偏移量 (CBC模式必填,16位):</label>
    <input type="text" id="ivKey" placeholder="例如: 1234567890abcdef" value="1234567890abcdef">

    <div class="btn-group">
        <button class="btn-encrypt" onclick="encryptText()">加密</button>
        <button class="btn-decrypt" onclick="decryptText()">解密</button>
        <button class="btn-clear" onclick="clearAll()">清空</button>
    </div>

    <label>结果输出:</label>
    <textarea id="outputText" placeholder="加密或解密结果将在此显示..." readonly></textarea>
</div>

<script>
function getKeyAndIV() {
    const key = document.getElementById('secretKey').value;
    const iv  = document.getElementById('ivKey').value;
    if (!key) { alert("请输入密钥!"); return null; }
    return {
        key: CryptoJS.enc.Utf8.parse(key),
        iv:  CryptoJS.enc.Utf8.parse(iv)
    };
}

function encryptText() {
    const text = document.getElementById('inputText').value;
    if (!text) { alert("请输入需要加密的内容!"); return; }
    const ki = getKeyAndIV(); if (!ki) return;
    const mode = document.getElementById('mode').value;

    try {
        const options = {
            mode: mode === 'CBC' ? CryptoJS.mode.CBC : CryptoJS.mode.ECB,
            padding: CryptoJS.pad.Pkcs7
        };
        if (mode === 'CBC') options.iv = ki.iv;

        const encrypted = CryptoJS.AES.encrypt(text, ki.key, options);
        document.getElementById('outputText').value = encrypted.toString();
    } catch (e) {
        alert("加密失败: " + e.message);
    }
}

function decryptText() {
    const text = document.getElementById('inputText').value;
    if (!text) { alert("请输入需要解密的密文!"); return; }
    const ki = getKeyAndIV(); if (!ki) return;
    const mode = document.getElementById('mode').value;

    try {
        const options = {
            mode: mode === 'CBC' ? CryptoJS.mode.CBC : CryptoJS.mode.ECB,
            padding: CryptoJS.pad.Pkcs7
        };
        if (mode === 'CBC') options.iv = ki.iv;

        const decrypted = CryptoJS.AES.decrypt(text, ki.key, options);
        const result = decrypted.toString(CryptoJS.enc.Utf8);
        if (!result) throw new Error("密钥或密文错误");
        document.getElementById('outputText').value = result;
    } catch (e) {
        alert("解密失败: " + e.message);
    }
}

function clearAll() {
    document.getElementById('inputText').value = '';
    document.getElementById('outputText').value = '';
}
</script>
</body>
</html>
